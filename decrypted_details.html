<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decrypted Student Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .details-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 40px;
            max-width: 550px;
            width: 90%;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s forwards;
        }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            color: #4f46e5;
            font-weight: 700;
            border-bottom: 3px solid #e0e7ff;
            padding-bottom: 10px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #e5e7eb;
            color: #1f2937;
        }
        .detail-label {
            font-weight: 600;
            color: #6b7280;
        }
        .detail-value {
            font-weight: 500;
            color: #1f2937;
        }
        #photo-container {
            margin: 25px auto;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #4f46e5;
            box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.2);
        }
        #photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="details-card">
        <h1 class="text-3xl header">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m-5.48-6.12l.966-2.508a1 1 0 011.838 0l.966 2.508M14.5 17.5l-3.375 1.5M4 17.5v-11A1.5 1.5 0 015.5 5h13A1.5 1.5 0 0120 6.5v11A1.5 1.5 0 0118.5 19H5.5A1.5 1.5 0 014 17.5z" />
            </svg>
            Decrypted Student Data
        </h1>

        <div id="photo-container">
            <img id="student-photo" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Student Photo Placeholder" class="bg-gray-200">
        </div>

        <div id="details-list" class="space-y-2 text-left">
            </div>

        <p id="error-message" class="text-red-600 font-semibold mt-4 hidden">Data not found. Please try the decryption process again.</p>

        <a href="dashboard.html" class="mt-8 inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-full transition-transform transform hover:scale-105">New QR Code</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataString = sessionStorage.getItem('finalDecryptedData');
            const photoUrl = sessionStorage.getItem('finalPhotoUrl');
            const detailsList = document.getElementById('details-list');
            const studentPhoto = document.getElementById('student-photo');
            const errorMessage = document.getElementById('error-message');

            if (dataString) {
                try {
                    const data = JSON.parse(dataString);
                    
                    // Display Photo
                    if (photoUrl) {
                        studentPhoto.src = photoUrl;
                        studentPhoto.alt = data.name + " Photo";
                    } else {
                         // Hide the photo container if no photo is found
                        document.getElementById('photo-container').classList.add('hidden');
                    }

                    // Display Details
                    for (const key in data) {
                        if (data.hasOwnProperty(key)) {
                            const item = document.createElement('div');
                            item.className = 'detail-item';
                            
                            const label = document.createElement('span');
                            // Capitalize the first letter for display
                            label.className = 'detail-label';
                            label.textContent = key.charAt(0).toUpperCase() + key.slice(1) + ':';
                            
                            const value = document.createElement('span');
                            value.className = 'detail-value';
                            value.textContent = data[key];

                            item.appendChild(label);
                            item.appendChild(value);
                            detailsList.appendChild(item);
                        }
                    }

                    // Clear the data after displaying
                    sessionStorage.removeItem('finalDecryptedData');
                    sessionStorage.removeItem('finalPhotoUrl');

                } catch (e) {
                    errorMessage.textContent = 'Error parsing decrypted data.';
                    errorMessage.classList.remove('hidden');
                    console.error('Parsing error:', e);
                }
            } else {
                errorMessage.textContent = 'No decrypted data found. Please complete the process from the dashboard.';
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
