<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Decryption</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto; 
            position: relative;
            /* FIXED BACKGROUND: Removed the gradient-pulse animation for stability */
            background: #1f2937; 
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin: 20px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            color: #1f2937;
        }
        /* Mode Toggle Styling */
        .mode-button {
            padding: 8px 16px;
            border-radius: 9999px; 
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-button.active {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .mode-button:not(.active) {
            background-color: #e5e7eb;
            color: #4b5563;
        }
        /* Style for Upload Mode */
        .file-input {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            color: #6b7280;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .file-input:hover { border-color: #4b5563; }
        .file-input input { display: none; }

        /* Style for Scan Mode */
        #reader {
            width: 100%;
            border: 2px solid #4f46e5;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold mb-4">Decrypt Student Data</h1>
        <p class="text-gray-600 mb-6">Retrieve the data using a QR image or live scanning.</p>

        <div class="flex justify-center space-x-4 mb-8 p-1 bg-gray-100 rounded-full shadow-inner">
            <button id="mode-upload-btn" class="mode-button active">1. Upload QR Image</button>
            <button id="mode-scan-btn" class="mode-button">2. Scan Live</button>
        </div>

        <div id="upload-mode" class="space-y-6 text-left">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Upload QR Code Image</label>
                <label for="qr-upload" class="file-input">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <span id="file-name">Choose a file</span>
                    <input type="file" id="qr-upload" accept="image/*">
                </label>
            </div>
            
            <div>
                <label for="encrypted-data" class="block text-sm font-medium text-gray-700 mb-2">Encrypted Data (from QR Code)</label>
                <textarea id="encrypted-data" rows="3" placeholder="Encrypted data will appear here after QR code is scanned..." readonly class="block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 bg-gray-100 resize-none font-mono text-sm"></textarea>
            </div>
            
            <div>
                <label for="iv-key" class="block text-sm font-medium text-gray-700 mb-2">Verification Code (IV-Key)</label>
                <input type="text" id="iv-key" placeholder="Enter the 6-character key" class="block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-center">
            </div>
        </div>

        <div id="scan-mode" class="hidden text-center space-y-4">
            <p class="text-sm font-medium text-gray-700">Point your camera at a QR code to scan the encrypted data.</p>
            <div id="reader"></div> 
            <p id="scan-status" class="text-red-500 font-semibold"></p>
        </div>

        <button id="decrypt-btn" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-8 rounded-full shadow-md transition-transform transform hover:scale-105" disabled>Decrypt and View Details</button>
    </div>

    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
    <script>
        const qrUploadInput = document.getElementById('qr-upload');
        const encryptedDataTextarea = document.getElementById('encrypted-data');
        const ivKeyInput = document.getElementById('iv-key');
        const decryptBtn = document.getElementById('decrypt-btn');
        const fileNameSpan = document.getElementById('file-name');
        const modeUploadBtn = document.getElementById('mode-upload-btn');
        const modeScanBtn = document.getElementById('mode-scan-btn');
        const uploadModeDiv = document.getElementById('upload-mode');
        const scanModeDiv = document.getElementById('scan-mode');
        const scanStatus = document.getElementById('scan-status');

        let html5QrCode = null;

        const checkInputs = () => {
            if (encryptedDataTextarea.value.length > 0 && ivKeyInput.value.length > 0 && !encryptedDataTextarea.value.includes('Could not find')) {
                decryptBtn.disabled = false;
            } else {
                decryptBtn.disabled = true;
            }
        };

        const stopScanner = () => {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(err => console.error("Failed to stop scanner: ", err));
            }
            scanStatus.textContent = '';
        };

        const startScanner = () => {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText, decodedResult) => {
                    // Success callback
                    encryptedDataTextarea.value = decodedText;
                    scanStatus.textContent = 'QR Code Scanned Successfully!';
                    scanStatus.classList.add('text-green-500');
                    scanStatus.classList.remove('text-red-500');
                    checkInputs();
                    stopScanner();
                },
                (errorMessage) => {
                    // Failure callback (e.g., no QR code found in frame)
                    scanStatus.textContent = 'Scanning... No QR Code Found in Frame.';
                    scanStatus.classList.add('text-red-500');
                    scanStatus.classList.remove('text-green-500');
                }
            ).catch((err) => {
                // Error when starting the scanner (e.g., no camera permission)
                scanStatus.textContent = `Error starting scanner: ${err.message}. Check camera permissions.`;
                console.error("Error starting scanner:", err);
            });
        };


        // Mode Switching
        modeUploadBtn.addEventListener('click', () => {
            modeUploadBtn.classList.add('active');
            modeScanBtn.classList.remove('active');
            uploadModeDiv.classList.remove('hidden');
            scanModeDiv.classList.add('hidden');
            stopScanner();
        });

        modeScanBtn.addEventListener('click', () => {
            modeScanBtn.classList.add('active');
            modeUploadBtn.classList.remove('active');
            uploadModeDiv.classList.add('hidden');
            scanModeDiv.classList.remove('hidden');
            encryptedDataTextarea.value = ''; // Clear previous data
            checkInputs();
            startScanner();
        });

        encryptedDataTextarea.addEventListener('input', checkInputs);
        ivKeyInput.addEventListener('input', checkInputs);

        // QR Upload Logic (uses jsQR)
        qrUploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        context.drawImage(img, 0, 0, img.width, img.height);
                        
                        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, imageData.width, imageData.height);
                        
                        if (code) {
                            encryptedDataTextarea.value = code.data;
                            checkInputs();
                        } else {
                            encryptedDataTextarea.value = 'Could not find a QR code in the image.';
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        decryptBtn.addEventListener('click', () => {
            stopScanner(); // Stop scanner before redirecting
            try {
                const encryptedData = encryptedDataTextarea.value;
                const ivKey = ivKeyInput.value;
                
                // 1. Decrypt the text data
                const decryptedBytes = CryptoJS.AES.decrypt(encryptedData, ivKey);
                const decryptedString = decryptedBytes.toString(CryptoJS.enc.Utf8);
                
                const decryptedPayload = JSON.parse(decryptedString);

                // 2. Fetch the large photo data using the IV-KEY
                const photoDataUrl = sessionStorage.getItem('studentPhoto_' + ivKey);

                // 3. Store the final data in sessionStorage for the next page
                sessionStorage.setItem('finalDecryptedData', JSON.stringify(decryptedPayload));
                
                if (photoDataUrl) {
                    sessionStorage.setItem('finalPhotoUrl', photoDataUrl);
                    // IMPORTANT: Clear the image data from sessionStorage once transferred
                    sessionStorage.removeItem('studentPhoto_' + ivKey); 
                } else {
                    sessionStorage.removeItem('finalPhotoUrl');
                }

                // 4. Redirect to the final details page
                window.location.href = `decrypted_details.html`;

            } catch (error) {
                console.error("Decryption failed:", error);
                alert("Decryption failed. Please check your QR code/scanned data and verification code (IV-Key).");
            }
        });

        // Initialize to Upload Mode on load
        document.addEventListener('DOMContentLoaded', () => {
            modeUploadBtn.click();
        });
    </script>
</body>
</html>
